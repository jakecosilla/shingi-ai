version: '3.8'

services:
  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
      - agent
    environment:
      - VITE_API_BASE_URL=http://backend:5000
      - VITE_AGENT_URL=http://agent:8000

  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"

  agent:
    build:
      context: ./src/agent
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - MODEL_NAME=llama3
      - OLLAMA_URL=http://host.docker.internal:11434 # Pointing to local Ollama if necessary
